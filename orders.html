<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — Gilded</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blush: #F9DBBD; --rose: #FFA5AB; --mauve: #DA627D; --wine: #A53860;
      --deep: #450920; --white: #fff; --off: #FDF7F2; --gold: #C5A059;
      --ivory: #F8F9FA; --dark: #121212; --sand: #E8D5C0; --warm-grey: #f0ebe5;
      --text-dark: #1a1410; --text-mid: #5c4a3a; --text-light: #9a8070;
      --border: rgba(197,160,89,0.25); --border-strong: rgba(197,160,89,0.5);
      --shadow-sm: 0 2px 12px rgba(69,9,32,0.07);
      --shadow-md: 0 8px 40px rgba(69,9,32,0.12);
      --muted: #9a8070;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--warm-grey);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 56px;
      padding: 0 24px;
      background: var(--off);
      border-bottom: 1px solid var(--border);
    }

    .back-link {
      position: absolute;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--wine); }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-dark);
    }

    /* ── PAGE ── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── ORDER CARD ── */
    .order-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    /* Card header: delivery date + track button */
    .order-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--ivory);
    }

    .delivery-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-dark);
      letter-spacing: 0.02em;
    }

    .delivery-date span {
      color: var(--text-mid);
      font-size: 13px;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      margin-right: 8px;
      letter-spacing: 0.04em;
    }

    .track-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border: 1px solid var(--border-strong);
      border-radius: 3px;
      background: transparent;
      color: var(--wine);
      font-family: 'Jost', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .track-btn:hover {
      background: var(--wine);
      color: #fff;
      border-color: var(--wine);
    }

    /* Order status badge */
    .order-status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--off);
    }

    .order-id-label {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 0.05em;
    }

    .order-id-val {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .status-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 2px;
    }

    .status-processing { background: #fff8e1; color: #a57900; }
    .status-shipped    { background: #e3f2fd; color: #1565c0; }
    .status-delivered  { background: #e6f4ec; color: #2e7d32; }

    /* Items list */
    .order-items { padding: 0; }

    .order-item {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .order-item:last-child { border-bottom: none; }

    /* Large image on left */
    .order-item-img {
      aspect-ratio: 4/3;
      background: var(--sand);
      overflow: hidden;
      flex-shrink: 0;
    }

    .order-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Info on right */
    .order-item-body {
      padding: 22px 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .order-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-dark);
      line-height: 1.2;
    }

    .order-item-qty {
      font-size: 13.5px;
      color: var(--text-mid);
    }

    .order-item-qty strong { color: var(--text-dark); }

    .order-item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-add-cart, .btn-buy {
      padding: 9px 22px;
      border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add-cart {
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--wine);
    }

    .btn-add-cart:hover {
      background: var(--blush);
      border-color: var(--mauve);
    }

    .btn-buy {
      border: 1px solid var(--wine);
      background: var(--wine);
      color: #fff;
    }

    .btn-buy:hover {
      background: var(--deep);
      border-color: var(--deep);
    }

    /* Card footer: totals */
    .order-card-footer {
      padding: 14px 28px;
      background: var(--ivory);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .order-delivery-info {
      font-size: 12.5px;
      color: var(--text-mid);
    }

    .order-total-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
    }

    /* Empty state */
    .orders-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      font-size: 15px;
    }

    .orders-empty a { color: var(--mauve); text-decoration: none; font-weight: 500; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--deep);
      color: #fff;
      padding: 12px 28px;
      border-radius: 2px;
      font-size: 13.5px;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 9999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .order-item { grid-template-columns: 1fr; }
      .order-item-img { width: 100%; aspect-ratio: 16/9; }
      .order-card-header { padding: 14px 16px; }
      .order-status-row { padding: 10px 16px; }
      .order-item-body { padding: 16px; }
      .order-card-footer { padding: 12px 16px; }
    }
  </style>
</head>

<body>
  <header class="top-bar">
    <a class="back-link" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <div class="page-title">Orders</div>
  </header>

  <div class="page-wrap">
    <div id="ordersList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ORDERS_KEY = 'orders';

    function getOrders() {
      try { return JSON.parse(localStorage.getItem(ORDERS_KEY)) || []; }
      catch { return []; }
    }

    function fmt(n) {
      const safe = Number.isFinite(Number(n)) ? Number(n) : 0;
      return '₱ ' + safe.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function statusClass(s) {
      const v = (s || '').toLowerCase();
      if (v === 'shipped') return 'status-shipped';
      if (v === 'delivered') return 'status-delivered';
      return 'status-processing';
    }

    function renderOrders() {
      const orders = getOrders();
      const list = document.getElementById('ordersList');

      if (!orders.length) {
        list.innerHTML = `<div class="orders-empty">
          You haven't placed any orders yet. <a href="products.html">Start shopping →</a>
        </div>`;
        return;
      }

      list.innerHTML = orders.map(order => `
        <div class="order-card">
          <div class="order-card-header">
            <div class="delivery-date">
              <span>Delivery date:</span>${order.estimatedArrival || '—'}
            </div>
            <button class="track-btn" onclick="showToast('Tracking feature coming soon.')">
              Track Order
            </button>
          </div>

          <div class="order-status-row">
            <span class="order-id-label">Order</span>
            <span class="order-id-val">${order.orderId || ''}</span>
            <span class="status-badge ${statusClass(order.status)}">${order.status || 'Processing'}</span>
          </div>

          <div class="order-items">
            ${(order.items || []).map(item => `
              <div class="order-item">
                <div class="order-item-img">
                  ${item.image ? `<img src="${item.image}" alt="${item.name || ''}" />` : ''}
                </div>
                <div class="order-item-body">
                  <div class="order-item-name">${item.name || 'Unknown Product'}</div>
                  <div class="order-item-qty">Qty: <strong>${item.qty}</strong></div>
                  <div class="order-item-actions">
                    <button class="btn-add-cart" onclick="addToCart(${JSON.stringify(item).replace(/"/g, '&quot;')})">Add to Cart</button>
                    <button class="btn-buy" onclick="buyNow(${JSON.stringify(item).replace(/"/g, '&quot;')})">Buy</button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="order-card-footer">
            <div class="order-delivery-info">
              🚚 ${order.delivery || 'Standard Delivery'} &nbsp;·&nbsp; Shipping: ${fmt(order.shippingFee)}
            </div>
            <div class="order-total-label">Total: ${fmt(order.grandTotal)}</div>
          </div>
        </div>
      `).join('');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    window.addToCart = function(item) {
      try {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const existing = cart.find(c => c.id === item.id);
        if (existing) { existing.qty += item.qty || 1; }
        else { cart.push({ ...item, qty: item.qty || 1 }); }
        localStorage.setItem('cart', JSON.stringify(cart));
        showToast('Added to cart!');
      } catch { showToast('Could not add to cart.'); }
    };

    window.buyNow = function(item) {
      sessionStorage.setItem('checkoutItems', JSON.stringify([{ ...item, qty: item.qty || 1 }]));
      window.location.href = 'checkout.html';
    };

    const justOrdered = sessionStorage.getItem('justOrdered');
    if (justOrdered) {
      sessionStorage.removeItem('justOrdered');
      window.addEventListener('DOMContentLoaded', () => {
        renderOrders();
        showToast('Order placed successfully! 🎉');
      });
    } else {
      document.addEventListener('DOMContentLoaded', renderOrders);
    }
  </script>
</body>

</html>
