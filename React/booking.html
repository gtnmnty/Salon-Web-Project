<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gilded - Book an Appointment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blush: #F9DBBD;
      --rose: #FFA5AB;
      --mauve: #DA627D;
      --wine: #A53860;
      --deep: #450920;
      --white: #fff;
      --off: #FDF7F2;
      --navy: #001f3f;
      --teal: #004d4d;
      --gold: #C5A059;
      --ivory: #F8F9FA;
      --dark: #121212;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--off);
      margin: 0;
    }

    /* NAVIGATION */
    nav {
      background: var(--white);
      padding: 1.2rem 4rem;
      box-shadow: 0 2px 10px rgba(69, 9, 32, 0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--deep);
      font-weight: 500;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    nav ul li a:hover {
      color: var(--mauve);
    }

    /* MAIN CONTAINER */
    .booking-container {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 0 2rem;
    }

    .booking-card {
      background: var(--white);
      border-radius: 12px;
      padding: 3rem;
      box-shadow: 0 10px 40px rgba(69, 9, 32, 0.1);
    }

    .booking-title {
      font-size: 2.5rem;
      color: var(--deep);
      text-align: center;
      margin-bottom: 1rem;
    }

    .booking-subtitle {
      text-align: center;
      color: var(--wine);
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      font-size: 0.95rem;
      color: var(--deep);
      cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* FORM */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--deep);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1.5px solid var(--blush);
      border-radius: 6px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: var(--white);
      font-family: inherit;
    }

    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: var(--mauve);
      box-shadow: 0 0 0 3px rgba(218, 98, 125, 0.1);
    }

    .input-group input::placeholder {
      color: #999;
    }

    /* BUTTONS */
    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .btn {
      padding: 1rem 2.5rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--mauve), var(--wine));
      color: var(--white);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(165, 56, 96, 0.3);
    }

    .btn-clear {
      background: var(--white);
      color: var(--wine);
      border: 1.5px solid var(--blush);
    }

    .btn-clear:hover {
      border-color: var(--mauve);
      background: var(--off);
    }
  </style>
</head>

<body>
  <!-- NAVIGATION -->
  <nav>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#products">Products</a></li>
      <li><a href="#book">Book Now</a></li>
      <li><a href="#cart">Cart</a></li>
      <li><a href="#account">Account</a></li>
    </ul>
  </nav>

  <!-- BOOKING FORM -->
  <div class="booking-container">
    <div class="booking-card">
      <h1 class="booking-title">Book an Appointment</h1>
      <p class="booking-subtitle">Fill in the details below and we'll line up your preferred schedule.</p>

      <label class="checkbox-label">
        <input type="checkbox" id="same-info">
        <span>Same info as account</span>
      </label>

      <form>
        <div class="form-grid">
          <div class="input-group">
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" placeholder="Full Name">
          </div>

          <div class="input-group">
            <label for="contact">Contact No.</label>
            <input type="text" id="contact" placeholder="09777777777">
          </div>

          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Email address">
          </div>

          <div class="input-group">
            <label for="service-type">Type of Service</label>
            <input type="text" id="service-type" placeholder="Service Type">
          </div>

          <div class="input-group">
            <label for="date">Preferred Date</label>
            <input type="text" id="date" placeholder="Date">
          </div>

          <div class="input-group">
            <label for="time">Time</label>
            <input type="text" id="time" placeholder="Time">
          </div>
        </div>

        <div class="input-group">
          <label for="branch">Select preferred / nearest branch</label>
          <select id="branch">
            <option value="">Select branch</option>
            <option>Makati Flagship</option>
            <option>BGC Studio</option>
            <option>Quezon City Lounge</option>
          </select>
        </div>

        <div class="input-group">
          <label for="service">Select preferred service</label>
          <select id="service">
            <option value="">Select service</option>
            <option>Hydra Facial</option>
            <option>Vitamin C Brightening Treatment</option>
            <option>Skin Consultation</option>
            <option>Deep Cleansing Facial</option>
            <option>Anti-Aging Treatment</option>
          </select>
        </div>

        <div class="btn-row">
          <button type="reset" class="btn btn-clear">Clear</button>
          <button type="submit" class="btn btn-submit">Submit</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
