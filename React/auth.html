<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gilded - Account Access</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blush: #F9DBBD;
      --rose: #FFA5AB;
      --mauve: #DA627D;
      --wine: #A53860;
      --deep: #450920;
      --white: #fff;
      --off: #FDF7F2;
      --navy: #001f3f;
      --teal: #004d4d;
      --gold: #C5A059;
      --ivory: #F8F9FA;
      --dark: #121212;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--off);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1200px;
      width: 100%;
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(69, 9, 32, 0.15);
      min-height: 700px;
    }

    /* LEFT SIDE - IMAGE SLIDER */
    .image-side {
      position: relative;
      overflow: hidden;
      background: var(--deep);
    }

    .image-slider {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: slideShow 6s infinite;
    }

    .slide:nth-child(1) {
      animation-delay: 0s;
    }

    .slide:nth-child(2) {
      animation-delay: 2s;
    }

    .slide:nth-child(3) {
      animation-delay: 4s;
    }

    @keyframes slideShow {
      0% {
        opacity: 0;
      }

      8.33% {
        opacity: 1;
      }

      33.33% {
        opacity: 1;
      }

      41.66% {
        opacity: 0;
      }

      100% {
        opacity: 0;
      }
    }

    .image-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 3rem;
      background: linear-gradient(to top, rgba(69, 9, 32, 0.95), transparent);
      color: var(--white);
      z-index: 10;
    }

    .image-overlay h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--blush);
    }

    .image-overlay p {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.95;
    }

    /* RIGHT SIDE - FORMS */
    .form-side {
      padding: 4rem 3rem;
      background: var(--ivory);
      position: relative;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-title {
      font-size: 2.5rem;
      color: var(--deep);
      margin-bottom: 0.5rem;
    }

    .form-subtitle {
      color: var(--wine);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--deep);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1.5px solid var(--blush);
      border-radius: 6px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: var(--white);
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--mauve);
      box-shadow: 0 0 0 3px rgba(218, 98, 125, 0.1);
    }

    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--deep);
      cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .forgot-link {
      color: var(--mauve);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s ease;
    }

    .forgot-link:hover {
      color: var(--wine);
    }

    .btn-main {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--mauve), var(--wine));
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1.5rem;
    }

    .btn-main:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(165, 56, 96, 0.3);
    }

    .social-text {
      text-align: center;
      color: var(--wine);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      padding: 0.8rem;
      background: var(--white);
      border: 1.5px solid var(--blush);
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--deep);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      border-color: var(--mauve);
      background: var(--off);
    }

    .toggle-text {
      text-align: center;
      color: var(--deep);
      font-size: 0.9rem;
    }

    .toggle-text span {
      color: var(--mauve);
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
    }

    .toggle-text span:hover {
      color: var(--wine);
    }

    .terms-check {
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .terms-check span {
      line-height: 1.4;
    }

    .inline-link {
      background: none;
      border: none;
      color: var(--mauve);
      text-decoration: underline;
      cursor: pointer;
      font-size: inherit;
      padding: 0;
    }

    .inline-link:hover {
      color: var(--wine);
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <!-- LEFT SIDE - IMAGE SLIDER -->
    <div class="image-side">
      <div class="image-slider">
        <!-- Login Images - Welcoming Back -->
        <div class="slide login-slide"
          style="background-image: url('https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1200&q=80')">
        </div>
        <div class="slide login-slide"
          style="background-image: url('https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&w=1200&q=80')">
        </div>
        <div class="slide login-slide"
          style="background-image: url('https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1200&q=80')">
        </div>

        <!-- Signup Images - Welcoming New Clients (hidden by default) -->
        <div class="slide signup-slide"
          style="background-image: url('https://images.unsplash.com/photo-1562322140-8baeececf3df?auto=format&fit=crop&w=1200&q=80'); display: none;">
        </div>
        <div class="slide signup-slide"
          style="background-image: url('https://images.unsplash.com/photo-1516975080664-ed2fc6a32937?auto=format&fit=crop&w=1200&q=80'); display: none;">
        </div>
        <div class="slide signup-slide"
          style="background-image: url('https://images.unsplash.com/photo-1519415387722-a1c3bbef716c?auto=format&fit=crop&w=1200&q=80'); display: none;">
        </div>
      </div>
      <div class="image-overlay">
        <h2 id="overlayTitle">Welcome Back</h2>
        <p id="overlayText">Your beauty journey continues here. Sign in to manage your appointments and enjoy
          personalized care.</p>
      </div>
    </div>

    <!-- RIGHT SIDE - FORMS -->
    <div class="form-side">
      <!-- LOGIN FORM -->
      <div id="loginForm" class="auth-form active">
        <h1 class="form-title">Log in</h1>
        <p class="form-subtitle">Welcome back</p>

        <div class="input-group">
          <label for="login-email">Email or Phone Number</label>
          <input type="text" id="login-email" placeholder="your@email.com">
        </div>

        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Enter your password">
        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox">
            <span>Remember Me</span>
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button class="btn-main">Log in</button>

        <p class="social-text">Log in with:</p>
        <div class="social-btns">
          <button class="social-btn">Google</button>
          <button class="social-btn">Apple</button>
        </div>

        <p class="toggle-text">
          Don't have an account?
          <span onclick="switchToSignup()">Create Account Now</span>
        </p>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" class="auth-form">
        <h1 class="form-title">Sign Up</h1>
        <p class="form-subtitle">New to Gilded</p>

        <div class="form-grid">
          <div class="input-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" placeholder="Full Name">
          </div>
          <div class="input-group">
            <label for="signup-phone">Contact / Phone No.</label>
            <input type="text" id="signup-phone" placeholder="09XX XXX XXXX">
          </div>
        </div>

        <div class="input-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" placeholder="your@email.com">
        </div>

        <div class="input-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Create a password">
        </div>

        <label class="checkbox-label terms-check">
          <input type="checkbox">
          <span>
            I agree to the
            <button class="inline-link" type="button">Terms and Conditions and Privacy Policy</button>
          </span>
        </label>

        <button class="btn-main">Create Account</button>

        <p class="social-text">Create using:</p>
        <div class="social-btns">
          <button class="social-btn">Google</button>
          <button class="social-btn">Apple</button>
        </div>

        <p class="toggle-text">
          Already Have an Account?
          <span onclick="switchToLogin()">Log in here.</span>
        </p>
      </div>
    </div>
  </div>

  <style>
    /* Additional styles for switching between login/signup */
    .signup-active .login-slide {
      display: none !important;
    }

    .signup-active .signup-slide {
      display: block !important;
    }
  </style>

  <script>
    function switchToSignup() {
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('signupForm').classList.add('active');
      document.querySelector('.auth-container').classList.add('signup-active');
      document.getElementById('overlayTitle').textContent = 'Join Gilded';
      document.getElementById('overlayText').textContent = 'Begin your beauty transformation. Create an account and discover our exclusive treatments and personalized care.';
    }

    function switchToLogin() {
      document.getElementById('signupForm').classList.remove('active');
      document.getElementById('loginForm').classList.add('active');
      document.querySelector('.auth-container').classList.remove('signup-active');
      document.getElementById('overlayTitle').textContent = 'Welcome Back';
      document.getElementById('overlayText').textContent = 'Your beauty journey continues here. Sign in to manage your appointments and enjoy personalized care.';
    }
  </script>
</body>

</html>
